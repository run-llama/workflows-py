name: Build Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        required: true
        type: string
      target:
        required: false
        type: string
        default: ''
      image-name:
        required: true
        type: string
      cache-scope:
        required: true
        type: string
      cache-mode:
        required: false
        type: string
        default: 'max'
      push:
        required: true
        type: boolean
      version:
        required: false
        type: string
        default: ''
      major_minor:
        required: false
        type: string
        default: ''
      is_rc:
        required: false
        type: string
        default: 'true'

env:
  REGISTRY: docker.io

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: ${{ inputs.push }}
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.target || '' }}
        platforms: ${{ matrix.platform }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.push && format('{0}/{1}:{2}-{3}', env.REGISTRY, inputs.image-name, inputs.version, matrix.suffix) || '' }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}-${{ matrix.suffix }}
        cache-to: type=gha,mode=${{ inputs.cache-mode }},scope=${{ inputs.cache-scope }}-${{ matrix.suffix }}

  merge:
    if: ${{ inputs.push }}
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Create multi-arch manifest
      env:
        VERSION: ${{ inputs.version }}
        MAJOR_MINOR: ${{ inputs.major_minor }}
        IS_RC: ${{ inputs.is_rc }}
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ inputs.image-name }}"
        TAGS="-t ${IMAGE}:${VERSION}"
        if [[ "${IS_RC}" == "false" ]]; then
          TAGS="$TAGS -t ${IMAGE}:latest"
          TAGS="$TAGS -t ${IMAGE}:${MAJOR_MINOR}"
        fi
        docker buildx imagetools create $TAGS \
          ${IMAGE}:${VERSION}-amd64 \
          ${IMAGE}:${VERSION}-arm64
