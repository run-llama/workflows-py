name: Version Bump and Release

on:
  push:
    branches:
      - main
      - dev

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Release PR management + publish planning.
  #
  # 1. Runs changesets/action to open/update the "version packages" release PR
  #    when there are pending changesets. When that PR merges into main/dev,
  #    the changesets folder is empty on the next push and this step is a
  #    no-op — then we proceed to plan & publish.
  # 2. Runs `dev changeset-plan` unconditionally. The plan is a reconcile
  #    loop: it diffs current workspace versions against what's already on
  #    PyPI / Docker Hub / the Helm registry and emits actions for the gaps.
  #    An empty plan is normal and results in all downstream jobs no-opping.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    environment: release
    if: github.repository == 'run-llama/workflows-py' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    outputs:
      has_work: ${{ steps.plan.outputs.has_work }}
      pypi: ${{ steps.plan.outputs.pypi }}
      docker_builds: ${{ steps.plan.outputs.docker_builds }}
      docker_manifests: ${{ steps.plan.outputs.docker_manifests }}
      helm: ${{ steps.plan.outputs.helm }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: pnpm install

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}

      - name: Install helm-docs
        run: |
          make -C operator helm-docs-install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Create / update Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
          # Only manage the release PR here. Actual publishing is done by
          # the fan-out jobs below so docker builds run in parallel on
          # native amd64 / arm64 runners.
          version: pnpm -w run version
          setupGitUser: false
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Compute publish plan
        id: plan
        run: uv run dev changeset-plan --output publish-plan.json

      - name: Upload publish plan
        uses: actions/upload-artifact@v4
        with:
          name: publish-plan
          path: publish-plan.json
          retention-days: 14

  # ---------------------------------------------------------------------------
  # PyPI: one job per package. Each job name includes the package so the
  # Actions UI shows a checkmark per published PyPI release.
  # ---------------------------------------------------------------------------
  pypi:
    name: "pypi: ${{ matrix.item.package }}"
    needs: plan
    if: needs.plan.outputs.has_work == 'true' && needs.plan.outputs.pypi != '[]'
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.plan.outputs.pypi) }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: publish-plan
      - name: Publish to PyPI
        run: uv run dev publish-pypi --plan publish-plan.json --package '${{ matrix.item.package }}'

  # ---------------------------------------------------------------------------
  # Docker builds: one job per (image, platform). arm64 runs on native arm
  # hardware, amd64 on standard runners — no QEMU emulation. Each job
  # pushes a per-arch tag like ``repo:version-amd64``; the manifest job
  # below stitches them into the final multi-arch tags.
  # ---------------------------------------------------------------------------
  docker-build:
    name: "docker: ${{ matrix.item.package }} (${{ matrix.item.platform }})"
    needs: plan
    if: needs.plan.outputs.has_work == 'true' && needs.plan.outputs.docker_builds != '[]'
    runs-on: ${{ matrix.item.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.plan.outputs.docker_builds) }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: publish-plan
      - name: Build and push ${{ matrix.item.platform }}
        run: |
          uv run dev publish-docker \
            --plan publish-plan.json \
            --image '${{ matrix.item.image }}' \
            --platform '${{ matrix.item.platform }}'

  # ---------------------------------------------------------------------------
  # Manifest merge: stitches per-arch tags into the final ``:version``,
  # ``:latest`` and ``:major.minor`` tags that users consume.
  # ---------------------------------------------------------------------------
  docker-manifest:
    name: "docker-manifest: ${{ matrix.item.package }}"
    needs: [plan, docker-build]
    if: needs.plan.outputs.has_work == 'true' && needs.plan.outputs.docker_manifests != '[]'
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.plan.outputs.docker_manifests) }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: publish-plan
      - name: Create multi-arch manifest
        run: |
          uv run dev publish-docker-manifest \
            --plan publish-plan.json \
            --image '${{ matrix.item.image }}'

  # ---------------------------------------------------------------------------
  # Helm: one job per chart. Depends on the manifest job because charts
  # reference the final image tags and must not be published before them.
  # ---------------------------------------------------------------------------
  helm:
    name: "helm: ${{ matrix.item.package }}"
    needs: [plan, docker-manifest]
    # Run even when there are no docker manifests (charts can be published
    # on their own) — but only when there are helm actions.
    if: |
      always() &&
      needs.plan.result == 'success' &&
      (needs.docker-manifest.result == 'success' || needs.docker-manifest.result == 'skipped') &&
      needs.plan.outputs.has_work == 'true' &&
      needs.plan.outputs.helm != '[]'
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.plan.outputs.helm) }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: azure/setup-helm@v4
        with:
          version: '3.18.1'
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          name: publish-plan
      - name: Publish helm chart
        run: uv run dev publish-helm --plan publish-plan.json --package '${{ matrix.item.package }}'

  # ---------------------------------------------------------------------------
  # Finalize: create git tags for everything we just published and fire the
  # downstream repository dispatches. Runs only if all publish jobs
  # succeeded (or were legitimately skipped because there was no work).
  # ---------------------------------------------------------------------------
  finalize:
    name: Finalize release
    needs: [plan, pypi, docker-build, docker-manifest, helm]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.has_work == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: pnpm install
      - uses: actions/download-artifact@v4
        with:
          name: publish-plan
      - name: Create and push git tags
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: uv run dev publish-git-tags

      - name: Extract published llama-agents-server version
        if: github.ref == 'refs/heads/main'
        id: server-version
        run: |
          VERSION=$(jq -r '.pypi[] | select(.package == "llama-agents-server") | .version' publish-plan.json)
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=llama-agents-server@v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Found llama-agents-server version: $VERSION"
          else
            echo "llama-agents-server was not published in this release"
          fi

      - name: Trigger OpenAPI publish for llama-agents-server
        if: github.ref == 'refs/heads/main' && steps.server-version.outputs.version != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          event-type: publish-openapi
          client-payload: '{"tag": "${{ steps.server-version.outputs.tag }}"}'

      - name: Trigger downstream version bump
        if: github.ref == 'refs/heads/main' && vars.DOWNSTREAM_DISPATCH_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          DISPATCH_REPO: ${{ vars.DOWNSTREAM_DISPATCH_REPO }}
        run: |
          PACKAGES=$(jq -c '[.pypi[] | {name: .package, version: .version}]' publish-plan.json)
          gh api "repos/$DISPATCH_REPO/dispatches" \
            --input - <<< "{\"event_type\":\"bump-cloud-llama-deploy\",\"client_payload\":{\"packages\":$PACKAGES}}"
