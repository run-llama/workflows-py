apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: llama-k8s-otel
data:
  create-phoenix-db.sql: |
    CREATE DATABASE phoenix;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
  namespace: llama-k8s-otel
  annotations:
    tilt.dev/down-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llama-k8s-otel
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llama-k8s-otel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: workflows
            - name: POSTGRES_PASSWORD
              value: workflows
            - name: POSTGRES_DB
              value: workflows
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata
        - name: init-scripts
          configMap:
            name: postgres-init
