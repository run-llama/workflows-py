apiVersion: v1
kind: Service
metadata:
  name: phoenix
  namespace: llama-k8s-otel
spec:
  selector:
    app: phoenix
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: ui
      port: 6006
      targetPort: 6006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix
  namespace: llama-k8s-otel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix
  template:
    metadata:
      labels:
        app: phoenix
    spec:
      containers:
        - name: phoenix
          image: arizephoenix/phoenix:latest
          ports:
            - containerPort: 4317
            - containerPort: 6006
          env:
            - name: PHOENIX_PORT
              value: "6006"
            - name: PHOENIX_SQL_DATABASE_URL
              value: "postgresql://workflows:workflows@postgres:5432/phoenix"
