apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: llama-k8s-otel
spec:
  selector:
    app: workflow-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: llama-k8s-otel
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxSurge 0 ensures new pods only start after old ones terminate,
      # freeing executor lease slots for the incoming replicas.
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: workflow-app
  template:
    metadata:
      labels:
        app: workflow-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U workflows; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: app
          image: k8s-otel-app
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_DSN
              value: postgresql://workflows:workflows@postgres:5432/workflows
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://phoenix:4317
            - name: SERVER_PORT
              value: "8080"
            - name: EXECUTOR_POOL_SIZE
              value: "3"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
