---
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-byte-order-marker
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
      - id: ty
        name: ty
        language: system
        entry: uv run ty check packages/llama-index-workflows packages/llama-index-workflows-client packages/llama-index-workflows-server packages/llama-index-utils-workflow packages/workflows-dev
        pass_filenames: false
      - id: ty-dbos
        name: ty (dbos)
        language: system
        entry: uv run --directory packages/llama-index-workflows-dbos ty check .
        pass_filenames: false
      - id: ty-integration-tests
        name: ty (integration-tests)
        language: system
        entry: uv run --directory packages/llama-index-integration-tests ty check .
        pass_filenames: false
  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: 1.31.1
    hooks:
      - id: basedpyright
        exclude: ^packages/llama-index-workflows-dbos/|^packages/llama-index-integration-tests/
  - repo: local
    hooks:
      - id: basedpyright-dbos
        name: basedpyright (dbos)
        language: system
        entry: uv run --directory packages/llama-index-workflows-dbos basedpyright
        pass_filenames: false
      - id: basedpyright-integration-tests
        name: basedpyright (integration-tests)
        language: system
        entry: uv run --directory packages/llama-index-integration-tests basedpyright
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        exclude: ^examples/|^docs/|pnpm-lock.yaml

  - repo: https://github.com/pappasam/toml-sort
    rev: v0.23.1
    hooks:
      - id: toml-sort-fix
