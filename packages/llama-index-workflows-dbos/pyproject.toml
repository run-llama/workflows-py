[build-system]
requires = ["uv_build>=0.9.10,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
  "pytest>=8.4.0",
  "pytest-asyncio>=1.0.0",
  "pytest-cov>=6.1.1",
  "pytest-timeout>=2.4.0",
  "pytest-xdist>=3.0.0"
]

[project]
name = "llama-index-workflows-dbos"
version = "0.1.0"
description = "DBOS durable runtime plugin for LlamaIndex Workflows"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
  "dbos>=2.10.0",
  "llama-index-workflows>=2.12.0,<3.0.0"
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
asyncio_default_test_loop_scope = "module"
testpaths = ["tests"]
addopts = "-nauto --timeout=10"

[tool.uv.build-backend]
module-name = "llama_agents.runtime.dbos"

[tool.uv.sources]
llama-index-workflows = {workspace = true}
